<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>फोटो गॅलरी | आमदार प्रकाश आबिटकर</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Mukta', sans-serif; }
        body { background: #f9f9f9; color: #333; }
        header { background: #000080; color: white; padding: 15px; text-align: center; font-weight: 800; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        
         
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .gallery-item { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; cursor: pointer; transition: 0.3s; border: 1px solid #ddd; }
        .gallery-item:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<header>फोटो गॅलरी</header>

<div class="container">
    <div class="gallery-grid" id="galleryContainer">
        
    </div>
</div>

<script>
    const allWorks = [{"Work_ID":"work-1784022327033","Date":"2026-07-20","Category":"बातम्या","Title":"आरोग्य शिबिर","Bhag":"राधानगरी","Status_Filter":"","Fund":"","Photos":"[\"https://raw.githubusercontent.com/vedchitrakolhapur/media-store-1/main/assets/images/img_1784022320937.webp\"]","YT_Link":"","Description":"<p><br></p>","DB_Status":"Active","rowIndex":2},{"Work_ID":"work-1784022248400","Date":"2026-07-14","Category":"बातम्या","Title":"रक्तदान शिबिर","Bhag":"आजरा","Status_Filter":"","Fund":"","Photos":"[]","YT_Link":"","Description":"<p><br></p>","DB_Status":"Active","rowIndex":3}];
    
    function renderGallery() {
        let container = document.getElementById('galleryContainer');
        let html = '';
        
        
        allWorks.forEach(w => {
            if(w.Category === 'गॅलरी' && w.Photos) {
                try {
                    let photos = JSON.parse(w.Photos);
                    photos.forEach(url => {
                        html += `<img src="${url}" class="gallery-item" onclick="window.open('${url}', '_blank')">`;
                    });
                } catch(e) {}
            }
        });
        
        container.innerHTML = html || '<p style="text-align:center; grid-column: 1/-1;">सध्या फोटो उपलब्ध नाहीत.</p>';
    }

    renderGallery();
</script>
</body>
</html>
