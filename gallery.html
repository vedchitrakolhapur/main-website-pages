    let galleryImages = [];
    rawWorks.filter(w => w.Category === 'गॅलरी').forEach(w => {
        try {
            let photos = JSON.parse(w.Photos || '[]');
            photos.forEach(imgUrl => {
                galleryImages.push({
                    Work_ID: w.Work_ID,
                    Date: w.Date,
                    Title: w.Title || '',
                    Description: w.Description || '',
                    Image: imgUrl,
                    AllPhotos: photos
                });
            });
        } catch(e){}
    });

    
    galleryImages.sort((a, b) => new Date(b.Date) - new Date(a.Date));

    
    let currentPage = 1;
    const itemsPerPage = 10; 
    let currentPopupIndex = -1;

    function toggleMobileMenu() {
        document.getElementById('mobileDropdown').classList.toggle('open');
    }

    function formatDate(dStr) { 
        if(!dStr) return '';
        let d = new Date(dStr);
        return d.toLocaleDateString('mr-IN', {day: 'numeric', month: 'short', year: 'numeric'});
    }

    
    function renderList() {
        const listContainer = document.getElementById('galleryListContainer');
        const startIndex = (currentPage - 1) * itemsPerPage;
        const endIndex = startIndex + itemsPerPage;
        const currentItems = galleryImages.slice(startIndex, endIndex);

        if (currentItems.length === 0) {
            listContainer.style.display = "block";
            listContainer.innerHTML = '<div style="text-align:center; padding: 40px 20px; background: white; border-radius: 12px; grid-column: 1 / -1;"><i class="fas fa-images" style="font-size: 40px; color: #ccc; margin-bottom: 15px; display:block;"></i><p style="color:#777; font-size: 18px; margin:0;">सध्या गॅलरीमध्ये कोणतेही फोटो उपलब्ध नाहीत.</p></div>';
            return;
        }

        let html = '';
        currentItems.forEach((item, index) => {
            let actualIndex = startIndex + index;
            let dateMeta = formatDate(item.Date);
            
            html += `
            <div class="gallery-card" onclick="showPopup(${actualIndex})">
                <div class="gallery-img-wrapper">
                    <img src="${item.Image}" class="gallery-img" loading="lazy">
                </div>
                ${dateMeta ? `<div class="gallery-date"><i class="far fa-calendar-alt"></i> ${dateMeta}</div>` : ''}
            </div>`;
        });
        
        listContainer.innerHTML = html;
    }

    
    function renderPagination() {
        const totalPages = Math.ceil(galleryImages.length / itemsPerPage);
        const paginationEl = document.getElementById('paginationContainer');
        
        if(totalPages <= 1) { 
            paginationEl.innerHTML = ''; 
            return; 
        }

        let html = '';

        
        html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})"><i class="fas fa-chevron-left"></i></button>`;

        
        let startPage = Math.max(1, currentPage - 2);
        let endPage = Math.min(totalPages, currentPage + 2);

        if(startPage > 1) {
            html += `<button class="page-btn" onclick="changePage(1)">1</button>`;
            if(startPage > 2) html += `<span class="page-dots">...</span>`;
        }

        for(let i = startPage; i <= endPage; i++) {
            html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
        }

        if(endPage < totalPages) {
            if(endPage < totalPages - 1) html += `<span class="page-dots">...</span>`;
            html += `<button class="page-btn" onclick="changePage(${totalPages})">${totalPages}</button>`;
        }

        // Next Button
        html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})"><i class="fas fa-chevron-right"></i></button>`;

        paginationEl.innerHTML = html;
    }

    window.changePage = function(page) {
        if(page < 1 || page > Math.ceil(galleryImages.length / itemsPerPage)) return;
        currentPage = page;
        renderList();
        renderPagination();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    
    window.showPopup = function(index) {
        currentPopupIndex = index;
        renderPopupContent();
        document.getElementById('popup').style.display = 'flex';
        document.body.classList.add('no-scroll'); 
    };

    window.closePopup = function() {
        document.getElementById('popup').style.display = 'none';
        document.body.classList.remove('no-scroll');
    };

    window.navigatePopup = function(direction) {
        currentPopupIndex += direction;
        renderPopupContent();
    };

    function renderPopupContent() {
        let item = galleryImages[currentPopupIndex];
        
        let titleEl = document.getElementById('modalTitle');
        if(item.Title) {
            titleEl.innerText = item.Title;
            titleEl.style.display = 'block';
        } else {
            titleEl.style.display = 'none';
        }
        
        let metaHtml = `<span style="background:#f0f2f5; padding:4px 10px; border-radius:20px;"><i class="far fa-calendar-alt"></i> ${formatDate(item.Date)}</span>`;
        document.getElementById('modalMeta').innerHTML = metaHtml;

        let descEl = document.getElementById('modalDesc');
        if(item.Description) {
            descEl.innerHTML = item.Description;
            descEl.style.display = 'block';
        } else {
            descEl.style.display = 'none';
        }

        
        let imgHtml = `<img src="${item.Image}">`;
        document.getElementById('modalImages').innerHTML = imgHtml;

        document.getElementById('prevBtn').disabled = (currentPopupIndex === 0);
        document.getElementById('nextBtn').disabled = (currentPopupIndex === galleryImages.length - 1);
        
        document.getElementById('modalScrollableArea').scrollTop = 0;
    }

    window.shareWork = function() {
        let item = galleryImages[currentPopupIndex];
        let shareUrl = window.location.origin + window.location.pathname;
        let shareText = "👉 आमदार साहेब - फोटो गॅलरी\nसविस्तर फोटो पाहण्यासाठी वेबसाईटला भेट द्या:\n";
        
        if (navigator.share) {
            navigator.share({ title: "फोटो गॅलरी", text: shareText, url: shareUrl }).catch(err => console.log(err));
        } else {
            let waLink = "https:" + "//wa.me/?text=" + encodeURIComponent(shareText + shareUrl);
            window.open(waLink, '_blank');
        }
    };

    window.addEventListener('DOMContentLoaded', () => {
        renderList();
        renderPagination();
    });

</script>
