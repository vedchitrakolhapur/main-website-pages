    function render() {

        }
        document.getElementById('newsContainer').innerHTML = newsHtml;

                // IMAGE FIX: Parsing w.Photos to get the first image

                worksHtml += `

    function showPopup(id) {
        let work = allWorks.find(w => w.Work_ID === id);
        if(!work) return;
        document.getElementById('modalTitle').innerText = work.Title;
        
        // Display description, funds, and youtube link in popup
        let bodyHtml = work.Description || '';
        if(work.Fund) bodyHtml += `<p style="margin-top:10px; background:#f8f9fa; padding:10px; border-radius:6px; border-left:3px solid #28a745;"><strong>निधी:</strong> ${work.Fund}</p>`;
