<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>आमदार प्रकाश आबिटकर</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Mukta', sans-serif; }
        body { background: #f9f9f9; color: #333; line-height: 1.6; }
        header { background: #ff9933; padding: 15px; color: white; text-align: center; font-weight: 800; font-size: 22px; }
        
         
        .hero-slider { width: 100%; height: 350px; overflow: hidden; position: relative; }
        .hero-slider img { width: 100%; height: 100%; object-fit: cover; border-radius: 0 0 20px 20px; }
        
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .section-title { font-size: 20px; color: #000080; border-left: 5px solid #ff9933; padding-left: 10px; margin: 25px 0 15px 0; font-weight: 800; }
        
         
        .works-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .work-card { background: white; padding: 10px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; }
        .work-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; }
        .work-card h4 { margin: 10px 0; font-size: 16px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .work-meta { display: flex; justify-content: space-between; font-size: 12px; color: #777; }
        
         
        .news-item { background: white; padding: 12px; margin-bottom: 10px; border-radius: 8px; border-bottom: 2px solid #eee; display: flex; justify-content: space-between; align-items: center;}
        
         
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index:9999; }
        .modal-content { background: white; width: 90%; max-width: 600px; padding: 20px; border-radius: 12px; max-height: 80vh; overflow-y: auto; position: relative; }
    </style>
</head>
<body>

<header>आमदार प्रकाश आबिटकर</header>

<div class="hero-slider">
    
    <img id="mainSliderImg" src="" alt="Slider">
</div>

<div class="container">
    <h2 class="section-title">ताज्या बातम्या व इव्हेंट्स</h2>
    <div id="newsContainer"></div>
    
    <h2 class="section-title">कार्य व विकासकामे</h2>
    <div class="works-grid" id="worksContainer"></div>
</div>


<div class="modal-overlay" id="popup">
    <div class="modal-content">
        <button onclick="document.getElementById('popup').style.display='none'" style="float:right; border:none; background:none; font-size:20px;">&times;</button>
        <h2 id="modalTitle"></h2>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    const allWorks = [];
    
    function render() {
        
        let newsHtml = '';
        allWorks.filter(w => w.Category === 'बातम्या').slice(0, 5).forEach(n => {
            newsHtml += `<div class="news-item"><span>${n.Title}</span><small>${n.Date.split('T')[0]}</small></div>`;
        });
        document.getElementById('newsContainer').innerHTML = newsHtml;
        
        // Render Works
        let worksHtml = '';
        allWorks.filter(w => w.Category !== 'बातम्या' && w.Category !== 'गॅलरी').slice(0, 6).forEach(w => {
            worksHtml += `
            <div class="work-card" onclick="showPopup('${w.Work_ID}')">
                <img src="${w.Cover_Image}">
                <h4>${w.Title}</h4>
                <div class="work-meta"><span>${w.Bhag || ''}</span><span>${w.Fund || ''}</span></div>
            </div>`;
        });
        document.getElementById('worksContainer').innerHTML = worksHtml;
    }

    function showPopup(id) {
        let work = allWorks.find(w => w.Work_ID === id);
        if(!work) return;
        document.getElementById('modalTitle').innerText = work.Title;
        document.getElementById('modalBody').innerHTML = work.Description + (work.Fund ? `<p><strong>निधी:</strong> ${work.Fund}</p>` : '');
        document.getElementById('popup').style.display = 'flex';
    }

    render();
</script>
</body>
</html>
