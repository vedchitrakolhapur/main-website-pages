    function render() {
        let container = document.getElementById('listContainer');
        let ministerWorks = allWorks.filter(w => w.Category === 'मंत्री निर्णय');
        
        if(ministerWorks.length === 0) {
            container.innerHTML = '<p style="text-align:center; margin-top:50px;">सध्या कोणतीही माहिती उपलब्ध नाही.</p>';
            return;
        }

        let html = '';
        ministerWorks.sort((a,b) => new Date(b.Date) - new Date(a.Date)).forEach(w => {
            html += `
            <div class="work-list-item" onclick="showPopup('${w.Work_ID}')">
                <img src="${w.Cover_Image}">
                <div>
                    <h4>${w.Title}</h4>
                    <span>${w.Date.split('T')[0]}</span>
                </div>
            </div>`;
        });
        container.innerHTML = html;
    }

    function showPopup(id) {
        let work = allWorks.find(w => w.Work_ID === id);
        if(!work) return;
        document.getElementById('modalTitle').innerText = work.Title;
        document.getElementById('modalBody').innerHTML = work.Description + (work.Fund ? `<p><strong>निधी:</strong> ${work.Fund}</p>` : '');
        document.getElementById('popup').style.display = 'flex';
    }

    render();
