    let ministerWorks = allWorks.filter(w => w.Category === 'मंत्री निर्णय');
    ministerWorks.sort((a, b) => new Date(b.Date) - new Date(a.Date)); 

    
    let currentPage = 1;
    const itemsPerPage = 25; 
    let currentPopupList = [];
    let currentPopupIndex = -1;

    function toggleMobileMenu() {
        document.getElementById('mobileDropdown').classList.toggle('open');
    }

    function getThumb(work) {
        try { let p = JSON.parse(work.Photos || '[]'); if(p.length > 0) return p[0]; } catch(e){}
        return null; 
    }

    function formatDate(dStr) { return dStr ? dStr.split('T')[0] : ''; }

    function getEmbedUrl(url) {
        if(!url) return '';
        let match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))((\w|-){11})/);
        return (match && match[1]) ? "https:" + "//www.youtube.com/embed/" + match[1] + "?autoplay=1&mute=0" : '';
    }

    
    function renderList() {
        const listContainer = document.getElementById('ministerListContainer');
        const startIndex = (currentPage - 1) * itemsPerPage;
        const endIndex = startIndex + itemsPerPage;
        const currentItems = ministerWorks.slice(startIndex, endIndex);

        if (currentItems.length === 0) {
            listContainer.innerHTML = '<p style="color:#777; text-align:center; padding: 30px; font-size: 18px;">सध्या कोणतीही माहिती उपलब्ध नाही.</p>';
            return;
        }

        let html = '';
        currentItems.forEach(w => {
            let meta = `<span><i class="far fa-calendar-alt"></i> ${formatDate(w.Date)}</span>`;
            if(w.Bhag && w.Bhag !== 'इतर') meta += `<span><i class="fas fa-map-marker-alt"></i> ${w.Bhag}</span>`;
            
            let thumb = getThumb(w);
            let imgBlock = ''; let extraClass = '';

            if (thumb) {
                imgBlock = `<img src="${thumb}" class="list-img">`;
            } else if (w.YT_Link) {
                extraClass = 'yt-special-item';
                imgBlock = `<div class="list-img yt-placeholder"><i class="fab fa-youtube"></i></div>`;
            }
            
            html += `
            <div class="list-item ${extraClass}" onclick="showPopup('${w.Work_ID}')">
                ${imgBlock}
                <div class="list-content">
                    <h4>${w.Title}</h4>
                    <div class="list-meta">${meta}</div>
                </div>
            </div>`;
        });
        
        listContainer.innerHTML = html;
    }

    
    function renderPagination() {
        const totalPages = Math.ceil(ministerWorks.length / itemsPerPage);
        const paginationEl = document.getElementById('paginationContainer');
        
        if(totalPages <= 1) { 
            paginationEl.innerHTML = ''; 
            return; 
        }

        let html = '';

        
        html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})"><i class="fas fa-chevron-left"></i></button>`;

        
        let startPage = Math.max(1, currentPage - 2);
        let endPage = Math.min(totalPages, currentPage + 2);

        if(startPage > 1) {
            html += `<button class="page-btn" onclick="changePage(1)">1</button>`;
            if(startPage > 2) html += `<span class="page-dots">...</span>`;
        }

        for(let i = startPage; i <= endPage; i++) {
            html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
        }

        if(endPage < totalPages) {
            if(endPage < totalPages - 1) html += `<span class="page-dots">...</span>`;
            html += `<button class="page-btn" onclick="changePage(${totalPages})">${totalPages}</button>`;
        }

        // Next Button
        html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})"><i class="fas fa-chevron-right"></i></button>`;

        paginationEl.innerHTML = html;
    }

    window.changePage = function(page) {
        if(page < 1 || page > Math.ceil(ministerWorks.length / itemsPerPage)) return;
        currentPage = page;
        renderList();
        renderPagination();
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    
    window.showPopup = function(id) {
        let work = ministerWorks.find(w => w.Work_ID === id);
        if(!work) return;
        currentPopupList = ministerWorks; 
        currentPopupIndex = currentPopupList.findIndex(w => w.Work_ID === id);
        
        renderPopupContent();
        document.getElementById('popup').style.display = 'flex';
        document.body.classList.add('no-scroll'); 
    };

    window.closePopup = function() {
        document.getElementById('popup').style.display = 'none';
        document.body.classList.remove('no-scroll');
        document.getElementById('modalYTContainer').innerHTML = ''; 
    };

    window.navigatePopup = function(direction) {
        currentPopupIndex += direction;
        renderPopupContent();
    };

    function renderPopupContent() {
        let w = currentPopupList[currentPopupIndex];
        
        document.getElementById('modalCategory').innerText = w.Category;
        document.getElementById('modalTitle').innerText = w.Title;
        
        let metaHtml = `<span style="background:#f0f2f5; padding:4px 10px; border-radius:20px;"><i class="far fa-calendar-alt"></i> ${formatDate(w.Date)}</span>`;
        if(w.Bhag && w.Bhag !== 'इतर') metaHtml += `<span style="background:#e8f4fd; color:#0056b3; padding:4px 10px; border-radius:20px;"><i class="fas fa-map-marker-alt"></i> ${w.Bhag}</span>`;
        if(w.Status_Filter && w.Status_Filter !== 'All') metaHtml += `<span style="background:#fff3cd; color:#856404; padding:4px 10px; border-radius:20px;"><i class="fas fa-info-circle"></i> ${w.Status_Filter}</span>`;
        if(w.Fund) metaHtml += `<span style="background:#d4edda; color:#155724; padding:4px 10px; border-radius:20px;"><i class="fas fa-rupee-sign"></i> निधी: ${w.Fund}</span>`;
        document.getElementById('modalMeta').innerHTML = metaHtml;

        let ytHtml = '';
        let embed = getEmbedUrl(w.YT_Link);
        if(embed) {
            ytHtml = `<div class="yt-iframe-wrapper"><iframe src="${embed}" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>`;
        }
        document.getElementById('modalYTContainer').innerHTML = ytHtml;

        document.getElementById('modalDesc').innerHTML = w.Description || '';

        let imgHtml = '';
        try {
            let photos = JSON.parse(w.Photos || '[]');
            photos.forEach(imgUrl => { imgHtml += `<img src="${imgUrl}">`; });
        } catch(e) {}
        document.getElementById('modalImages').innerHTML = imgHtml;

        document.getElementById('prevBtn').disabled = (currentPopupIndex === 0);
        document.getElementById('nextBtn').disabled = (currentPopupIndex === currentPopupList.length - 1);
        
        document.getElementById('modalScrollableArea').scrollTop = 0;
    }

    window.shareWork = function() {
        let w = currentPopupList[currentPopupIndex];
        let shareUrl = window.location.origin + window.location.pathname + "?work=" + w.Work_ID;
        let shareText = "👉 " + w.Title + "\nसविस्तर माहितीसाठी खालील लिंकवर क्लिक करा:\n";
        
        if (navigator.share) {
            navigator.share({ title: w.Title, text: shareText, url: shareUrl }).catch(err => console.log(err));
        } else {
            let waLink = "https:" + "//wa.me/?text=" + encodeURIComponent(shareText + shareUrl);
            window.open(waLink, '_blank');
        }
    };

    window.addEventListener('DOMContentLoaded', () => {
        
        renderList();
        renderPagination();

        
        let params = new URLSearchParams(window.location.search);
        let workId = params.get('work');
        if(workId) { setTimeout(() => showPopup(workId), 500); }
    });

</script>
